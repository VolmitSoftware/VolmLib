String configuredGroup = providers.gradleProperty('group')
    .orElse('art.arcane')
    .get()
String configuredVersion = providers.gradleProperty('version')
    .orElse('local-SNAPSHOT')
    .get()

group = configuredGroup
version = configuredVersion

allprojects {
    group = rootProject.group
    version = rootProject.version

    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url = uri('https://repo.papermc.io/repository/maven-public/')
        }
    }
}
